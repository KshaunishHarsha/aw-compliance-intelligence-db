services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-compliance_db}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compliance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
      - ./corpus:/app/corpus:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/compliance_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/compliance_db
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
      - ./corpus:/app/corpus:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_worker", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/compliance_db
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/compliance_db
      - REDIS_URL=redis://redis:6379/0
